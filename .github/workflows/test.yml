name: Database Admin Server Tests

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: writing_server_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/writing_server_test
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "Test database configured"

      - name: Initialize database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/writing_server_test
        run: |
          # Run database initialization if init.sql exists
          if [ -f init.sql ]; then
            PGPASSWORD=postgres psql -h localhost -U postgres -d writing_server_test -f init.sql
          fi

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/writing_server_test
          NODE_ENV: test
        run: |
          npm test || node tests/database-admin-server/run-tests.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/

      - name: Report coverage
        if: success()
        run: |
          echo "✅ Tests completed successfully"
          echo "📊 Coverage goal: 90%+"

  kanban-github-sync-tests:
    name: Kanban GitHub Sync Poller Tests
    runs-on: ubuntu-latest
    # GH issue #64: unit tests for the URL/owner-repo#N parsing, matching,
    # and status-transition logic. DB and gh CLI are both fully mocked (see
    # tests/kanban-server/), so no postgres service or gh auth is needed here.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run github-sync-lib unit tests
        run: node tests/kanban-server/github-sync-lib.test.js

      - name: Run github-sync orchestration tests (mocked DB + gh client)
        run: node tests/kanban-server/github-sync.test.js

  workflow-manager-server-tests:
    name: Workflow Manager Server Tests
    runs-on: ubuntu-latest
    # GH issue #57: regression test for the workflow_definitions upsert
    # ON CONFLICT arbiter mismatch. DB is fully mocked (see
    # tests/workflow-manager-server/), so no postgres service is needed here.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run definition-handlers tests (mocked DB)
        run: node tests/workflow-manager-server/definition-handlers.test.js

  single-server-runner-tests:
    name: Single Server Runner Route Tests
    runs-on: ubuntu-latest
    # bead mws-1783883496459-8-4a224c2b: regression coverage for Express
    # route registration order in src/single-server-runner.js. Spawns the
    # real server as a child process against an unreachable-but-valid
    # DATABASE_URL (pg.Pool connects lazily, so no postgres service needed)
    # and hits it over real HTTP.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run route precedence regression test
        run: node test/single-server-runner/route-precedence-test.js

  plot-server-tests:
    name: Plot Server Tests
    runs-on: ubuntu-latest
    # bead mws-1783883496416-7-47d7c3e7: link_plot_threads + get_world_systems
    # coverage. DB is fully mocked (see tests/plot-server/), so no postgres
    # service is needed here.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run plot-server tests
        run: node tests/plot-server/run-tests.js

  story-analysis-server-tests:
    name: Story Analysis Server Wrapper Tests
    runs-on: ubuntu-latest
    # bead mws-1783883496278-4-e2749385: config-mcps phase-based wrapper for
    # story-analysis-server. This checks tool visibility/routing on the
    # wrapper only (src/config-mcps/story-analysis-server/index.js) against
    # an unreachable-but-valid DATABASE_URL (pg.Pool connects lazily, so no
    # postgres service is needed here) -- no live DB queries are exercised.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run story-analysis-server wrapper tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/writing_server_test
        run: node --test tests/story-analysis-server/story-analysis-wrapper.test.js

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        if: hashFiles('.eslintrc*') != ''
        run: npm run lint || echo "No lint script configured"
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerable dependencies
        run: |
          echo "🔒 Checking for security vulnerabilities..."
          npm audit || echo "⚠️ Security vulnerabilities detected - review recommended"
